# CY/LIVE - Production-Grade Streaming Ecosystem
# Docker Compose v3.8 - Hardened VPC Architecture
# Principal Architect: Full MCP-Integrated Stack

version: '3.8'

x-common-security: &common-security
  security_opt:
    - no-new-privileges:true
  read_only: true
  tmpfs:
    - /tmp:noexec,nosuid,size=100m
  deploy:
    resources:
      limits:
        cpus: '2.0'
        memory: 2G
      reservations:
        cpus: '0.5'
        memory: 512M

services:
  # ==========================================
  # VPC GATEWAY - NGINX REVERSE PROXY
  # ==========================================
  gateway:
    image: nginx:alpine
    container_name: cylive-gateway
    ports:
      - "80:80"
      - "443:443"
      - "1935:1935"   # RTMP
      - "8888:8888"   # WebRTC
      - "8890:8890"   # SRT
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/waf:/etc/nginx/waf:ro
    networks:
      - cylive-vpc
    depends_on:
      - frontend
      - n8n
      - mediamtx
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  # ==========================================
  # THIN FRONTEND - Next.js 14 (UI ONLY)
  # Zero Business Logic - Pure Presentation Layer
  # ==========================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_N8N_URL=http://n8n:5678
        - NEXT_PUBLIC_MEDIAMTX_URL=http://mediamtx:8888
    container_name: cylive-frontend
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - NEXT_PUBLIC_API_URL=http://n8n:5678
      # All sensitive config comes from N8n, never hardcoded
    expose:
      - "3000"
    networks:
      - cylive-vpc
    depends_on:
      - n8n
    restart: unless-stopped
    <<: *common-security
    read_only: false  # Next.js needs write for .next cache
    tmpfs:
      - /tmp:noexec,nosuid,size=500m
      - /app/.next:size=500m

  # ==========================================
  # THICK BACKEND BRAIN - N8n MCP Server
  # ALL Business Logic, AI, Orchestration
  # ==========================================
  n8n:
    image: n8nio/n8n:latest
    container_name: cylive-n8n-brain
    ports:
      - "5678:5678"
    environment:
      # N8n Core
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=${WEBHOOK_URL:-http://localhost:5678}
      
      # Database
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=${N8N_DB_PASSWORD}
      
      # Redis for real-time state
      - N8N_REDIS_HOST=redis
      - N8N_REDIS_PORT=6379
      - N8N_REDIS_PASSWORD=${REDIS_PASSWORD}
      
      # MCP Server Configuration
      - MCP_ENABLED=true
      - MCP_PORT=5679
      - MCP_AUTH_TOKEN=${MCP_AUTH_TOKEN}
      
      # AI Services
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      
      # Security
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=true
      - N8N_HIDE_USAGE_PAGE=true
      
      # Execution Settings
      - EXECUTIONS_MODE=regular
      - EXECUTIONS_TIMEOUT=300
      - EXECUTIONS_TIMEOUT_MAX=3600
      - EXECUTIONS_DATA_SAVE_ON_ERROR=all
      - EXECUTIONS_DATA_SAVE_ON_SUCCESS=all
      
      # Encryption
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
    volumes:
      - n8n-data:/home/node/.n8n
      - ./n8n/workflows:/home/node/.n8n/workflows:ro
      - ./n8n/credentials:/home/node/.n8n/credentials:ro
      - ./n8n/scripts:/home/node/scripts:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cylive-vpc
      - cylive-internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5678/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==========================================
  # MCP REGISTRY - Tool Discovery Service
  # ==========================================
  mcp-registry:
    image: node:20-alpine
    container_name: cylive-mcp-registry
    command: node /app/registry.js
    volumes:
      - ./mcp-registry:/app:ro
    ports:
      - "5679:5679"
    environment:
      - REGISTRY_PORT=5679
      - N8N_URL=http://n8n:5678
      - AUTH_TOKEN=${MCP_AUTH_TOKEN}
    networks:
      - cylive-vpc
      - cylive-internal
    depends_on:
      - n8n
    restart: unless-stopped

  # ==========================================
  # POSTGRESQL - Atomic Ledger & Persistence
  # ==========================================
  postgres:
    image: postgres:15-alpine
    container_name: cylive-postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=cylive
      - POSTGRES_INITDB_ARGS=--auth-host=scram-sha-256
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
      - ./postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    networks:
      - cylive-vpc
      - cylive-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  # ==========================================
  # REDIS - Real-time State & Master Clock
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: cylive-redis
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 2gb
      --maxmemory-policy allkeys-lru
      --protected-mode yes
    volumes:
      - redis-data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      - cylive-vpc
      - cylive-internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  # ==========================================
  # MEDIAMTX - Media Ingestion (SRT/WebRTC/RTMP)
  # ==========================================
  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: cylive-mediamtx
    environment:
      - MTX_PROTOCOLS=tcp
      - MTX_WEBRTCADDITIONALHOSTS=${MEDIAMTX_HOSTS:-localhost}
      - MTX_WEBRTCLOCALUDPADDRESS=:8189
      - MTX_WEBRTCLocalTCPAddress=:8888
      - MTX_RTMP=yes
      - MTX_HLS=yes
      - MTX_WEBRTC=yes
      - MTX_SRT=yes
      - MTX_API=yes
      - MTX_APIAddress=:9997
    volumes:
      - ./mediamtx/mediamtx.yml:/mediamtx.yml:ro
      - ./mediamtx/recordings:/recordings
    expose:
      - "9997"  # API
    ports:
      - "8889:8889"  # WebRTC WS
    networks:
      - cylive-vpc
      - cylive-internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9997/v3/paths/list"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==========================================
  # FFMPEG ORCHESTRATOR - Fan-out & Processing
  # ==========================================
  ffmpeg-orchestrator:
    build:
      context: ./ffmpeg
      dockerfile: Dockerfile
    container_name: cylive-ffmpeg
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - MEDIAMTX_API=http://mediamtx:9997
      - N8N_WEBHOOK_URL=http://n8n:5678/webhook
      - SELF_HEALING_ENABLED=true
      - RESTART_THRESHOLD=3
    volumes:
      - ./mediamtx/recordings:/recordings
      - ./ffmpeg/scripts:/app/scripts:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - cylive-vpc
      - cylive-internal
    depends_on:
      - redis
      - mediamtx
      - n8n
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G
        reservations:
          cpus: '1.0'
          memory: 2G

  # ==========================================
  # AI SERVICES - Whisper + Claude Bridge
  # ==========================================
  ai-services:
    build:
      context: ./ai-services
      dockerfile: Dockerfile
    container_name: cylive-ai
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - N8N_WEBHOOK_URL=http://n8n:5678/webhook
      - WHISPER_MODEL=base
      - CLAUDE_MODEL=claude-3-5-sonnet-20241022
      - HYPE_VELOCITY_THRESHOLD=10  # Messages per 10 seconds
    volumes:
      - ./ai-services/models:/app/models
      - ./mediamtx/recordings:/recordings:ro
    networks:
      - cylive-vpc
      - cylive-internal
    depends_on:
      - redis
      - n8n
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G

  # ==========================================
  # VAULT - AES-256 Key Management
  # ==========================================
  vault:
    image: hashicorp/vault:latest
    container_name: cylive-vault
    ports:
      - "8200:8200"
    environment:
      - VAULT_DEV_ROOT_TOKEN_ID=${VAULT_TOKEN}
      - VAULT_DEV_LISTEN_ADDRESS=0.0.0.0:8200
      - VAULT_ADDR=http://localhost:8200
    volumes:
      - vault-data:/vault/file
      - ./vault/config:/vault/config:ro
    command: server -dev -dev-root-token-id="${VAULT_TOKEN}"
    cap_add:
      - IPC_LOCK
    networks:
      - cylive-vpc
      - cylive-internal
    restart: unless-stopped

  # ==========================================
  # OIDC PROVIDER - Keycloak
  # ==========================================
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: cylive-keycloak
    command: start-dev
    environment:
      - KEYCLOAK_ADMIN=${KEYCLOAK_ADMIN:-admin}
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD}
      - KC_DB=postgres
      - KC_DB_URL_HOST=postgres
      - KC_DB_URL_DATABASE=keycloak
      - KC_DB_USERNAME=keycloak
      - KC_DB_PASSWORD=${KEYCLOAK_DB_PASSWORD}
      - KC_HOSTNAME=${KEYCLOAK_HOSTNAME:-localhost}
      - KC_HTTP_ENABLED=true
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    networks:
      - cylive-vpc
      - cylive-internal
    restart: unless-stopped

  # ==========================================
  # MONITORING - Prometheus + Grafana
  # ==========================================
  prometheus:
    image: prom/prometheus:latest
    container_name: cylive-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    ports:
      - "9090:9090"
    networks:
      - cylive-vpc
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: cylive-grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana:/etc/grafana/provisioning:ro
    ports:
      - "3001:3000"
    networks:
      - cylive-vpc
    depends_on:
      - prometheus
    restart: unless-stopped

# ==========================================
# NETWORKS - Hardened VPC Architecture
# ==========================================
networks:
  cylive-vpc:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
    driver_opts:
      com.docker.network.bridge.name: cylive-vpc
  cylive-internal:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.21.0.0/16

# ==========================================
# VOLUMES - Persistent Data
# ==========================================
volumes:
  n8n-data:
    driver: local
  postgres-data:
    driver: local
  redis-data:
    driver: local
  vault-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
